<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Tourist Attraction Finder</title>
        <link rel="stylesheet" href="login.css">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
         
    </head>
    <body>
        <img class="background-img" src="../../assets/background.png">
        
        <div class="wrap">

            <img data-aos="fade-right" data-aos-duration="2000" class="logo-img"   src="../../assets/logo.png">

            <div data-aos="fade-left" data-aos-duration="2000"class="container">
                <h1 class="text-form">Welcome Back</h1>

                <span style="color:rgb(8, 86, 138);
                font-weight:bold;
                font-size:15px;">Sign in to continue your journey</span>

                <div>
                    <input style="margin-top:40px;" type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <button>Sign In</button>

                <p style="color:rgba(72, 63, 63, 1);
                font-size:15px;
                margin-bottom:5px">Don't have an account?<a href="register.html">Sign up for free</a></p>
                
                <div class="divider">
                    <span>Or continue with</span>
                </div>


                <div class="social-login">
                    <span class="iconify" data-icon="logos:google-icon" data-width="20"></span>
                    <span class="iconify" data-icon="logos:facebook" data-width="20"></span>
                    <span class="iconify" data-icon="logos:apple" data-width="17"></span>
                    <span class="iconify" data-icon="logos:twitter" data-width="24"></span>
                </div>
            </div>
        </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script>
        AOS.init();
    </script>
    </body>
